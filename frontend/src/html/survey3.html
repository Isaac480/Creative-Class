<!-- KAI Questionnaire -->
<style>
    .kai-question {
        margin-bottom: 1.5rem;
    }
    .kai-question label {
        display: block;
        margin-bottom: 0.5rem;
    }
    .kai-btn-group .kai-btn {
        padding: 8px 18px;
        margin-right: 6px;
        border: 2px solid #6c757d;
        border-radius: 4px;
        background: #fff;
        color: #333;
        cursor: pointer;
        font-size: 0.95rem;
        transition: background 0.15s, border-color 0.15s;
    }
    .kai-btn-group .kai-btn:hover {
        background: #e9ecef;
    }
    .kai-btn-group .kai-btn.active {
        background: #2c3e50;
        color: #fff;
        border-color: #2c3e50;
    }
    .kai-validation-error {
        color: #e74c3c;
        font-size: 0.9rem;
        margin-top: 0.3rem;
        display: none;
    }
    #kai-global-error {
        color: #e74c3c;
        font-weight: bold;
        font-size: 1rem;
        margin-bottom: 1rem;
        display: none;
    }
</style>

<div id="survey3FormContainer" class="container my-5 text-left">
    <form id="survey3Form" name="survey3Form" onsubmit="return false">

        <h3 class="mb-4">KAI Questionnaire</h3>
        <p class="text-muted mb-4">How easy or difficult do you find it to present yourself, consistently, over a long period as:</p>

        <div id="kai-global-error">Please answer all questions before continuing.</div>

        <div id="kai-questions-container"></div>

        <div id="survey3FormButtonContainer" class="container text-center my-5">
            <button id="continueButton" class="btn btn-lg btn-primary">Next</button>
        </div>
    </form>
</div>

<script>
(function() {
    var questions = [
        "a person who is patient.",
        "a person who conforms.",
        "a person who, when stuck, will always think of something.",
        "a person who enjoys detailed work.",
        "a person who would rather create something than improve it.",
        "a person who is prudent when dealing with authority or general opinion.",
        "a person who never acts without proper authority.",
        "a person who never seeks to bend (much less break) the rules.",
        "a person who likes bosses and work patterns that are consistent.",
        "a person who holds back ideas until they are clearly needed.",
        "a person who has fresh perspectives on old problems.",
        "a person who likes to vary set routines at a moment's notice.",
        "a person who prefers changes to occur gradually.",
        "a person who is thorough.",
        "a person who is a steady plodder.",
        "a person who can cope with several new ideas and problems at the same time.",
        "a person who is consistent.",
        "a person who is able to stand alone in disagreement against a group of equals or seniors.",
        "a person who is stimulating.",
        "a person who readily agrees with the team at work.",
        "a person who has original ideas.",
        "a person who masters all details painstakingly.",
        "a person who generates many ideas.",
        "a person who prefers to work on one problem at a time.",
        "a person who is methodical and systematic.",
        "a person who often risks doing things differently.",
        "a person who works without deviation in a prescribed way.",
        "a person who likes to impose strict order on matters within their control.",
        "a person who likes the protection of precise instructions.",
        "a person who fits readily into the system.",
        "a person who needs the stimulation of frequent change.",
        "a person who prefers colleagues who never rock the boat.",
        "a person who is predictable."
    ];

    var options = ["Very Hard", "Hard", "Easy", "Very Easy"];
    var container = document.getElementById("kai-questions-container");

    questions.forEach(function(text, i) {
        var qNum = i + 1;
        var div = document.createElement("div");
        div.className = "kai-question";

        var label = document.createElement("label");
        label.textContent = qNum + ". " + text;
        div.appendChild(label);

        var input = document.createElement("input");
        input.type = "hidden";
        input.name = "Q" + qNum;
        input.id = "Q" + qNum;
        input.className = "response kai-hidden-input";
        div.appendChild(input);

        var btnGroup = document.createElement("div");
        btnGroup.className = "kai-btn-group";

        options.forEach(function(opt) {
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "kai-btn";
            btn.textContent = opt;
            btn.setAttribute("data-question", "Q" + qNum);
            btn.setAttribute("data-value", opt);

            btn.addEventListener("click", function() {
                var hiddenInput = document.getElementById(this.getAttribute("data-question"));
                var siblings = this.parentNode.querySelectorAll(".kai-btn");

                if (this.classList.contains("active")) {
                    this.classList.remove("active");
                    hiddenInput.value = "";
                } else {
                    siblings.forEach(function(s) { s.classList.remove("active"); });
                    this.classList.add("active");
                    hiddenInput.value = this.getAttribute("data-value");
                }

                var errorEl = this.parentNode.parentNode.querySelector(".kai-validation-error");
                if (errorEl && hiddenInput.value) {
                    errorEl.style.display = "none";
                }
            });

            btnGroup.appendChild(btn);
        });

        div.appendChild(btnGroup);

        var errorMsg = document.createElement("div");
        errorMsg.className = "kai-validation-error";
        errorMsg.textContent = "Please select an option.";
        div.appendChild(errorMsg);

        container.appendChild(div);
    });

    window.validateKaiForm = function() {
        var allAnswered = true;
        var inputs = container.querySelectorAll(".kai-hidden-input");
        var globalError = document.getElementById("kai-global-error");

        inputs.forEach(function(input) {
            var questionDiv = input.closest(".kai-question");
            var errorEl = questionDiv.querySelector(".kai-validation-error");
            if (!input.value) {
                allAnswered = false;
                errorEl.style.display = "block";
            } else {
                errorEl.style.display = "none";
            }
        });

        if (!allAnswered) {
            globalError.style.display = "block";
            var firstUnanswered = container.querySelector(".kai-validation-error[style*='block']");
            if (firstUnanswered) {
                firstUnanswered.closest(".kai-question").scrollIntoView({ behavior: "smooth", block: "center" });
            }
        } else {
            globalError.style.display = "none";
        }

        return allAnswered;
    };
})();
</script>
