<script>
// Simple validation function for KAI questionnaire
function validateKAIForm() {
    let allQuestionsAnswered = true;
    
    // Check if all questions have been answered
    for (let i = 1; i <= 24; i++) {
        const radioButtons = document.querySelectorAll(`input[name="question${i}"]`);
        let questionAnswered = false;
        
        radioButtons.forEach(radio => {
            if (radio.checked) {
                questionAnswered = true;
            }
        });
        
        if (!questionAnswered) {
            allQuestionsAnswered = false;
            // Highlight the unanswered question
            const questionCard = radioButtons[0].closest('.card');
            if (questionCard) {
                questionCard.style.borderColor = '#dc3545';
                questionCard.style.borderWidth = '2px';
            }
        } else {
            // Reset highlight for answered questions
            const questionCard = radioButtons[0].closest('.card');
            if (questionCard) {
                questionCard.style.borderColor = '';
                questionCard.style.borderWidth = '';
            }
        }
    }
    
    return allQuestionsAnswered;
}

// Add validation to the continue button
document.addEventListener('DOMContentLoaded', function() {
    const continueButton = document.getElementById('continueButton');
    if (continueButton) {
        continueButton.addEventListener('click', function(e) {
            if (!validateKAIForm()) {
                e.preventDefault();
                alert('Please answer all questions before proceeding.');
            }
        });
    }
    
    // Initialize Bootstrap button group toggle functionality
    // This ensures the visual feedback works when clicking buttons
    const buttonGroups = document.querySelectorAll('.btn-group-toggle');
    buttonGroups.forEach(function(btnGroup) {
        const radioButtons = btnGroup.querySelectorAll('input[type="radio"]');
        radioButtons.forEach(function(radio) {
            radio.addEventListener('change', function() {
                const parentLabel = this.parentElement;
                const allLabels = this.closest('.btn-group').querySelectorAll('.btn');
                allLabels.forEach(label => label.classList.remove('active'));
                if (this.checked) {
                    parentLabel.classList.add('active');
                }
            });
        });
    });
});
</script>
