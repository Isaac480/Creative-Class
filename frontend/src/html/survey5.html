<!-- Societal Change Perceptions Survey -->
<style>
    .s5-question {
        margin-bottom: 1.5rem;
    }
    .s5-question label {
        display: block;
        margin-bottom: 0.5rem;
    }
    .s5-btn-group .s5-btn {
        padding: 8px 18px;
        margin-right: 6px;
        border: 2px solid #6c757d;
        border-radius: 4px;
        background: #fff;
        color: #333;
        cursor: pointer;
        font-size: 0.95rem;
        transition: background 0.15s, border-color 0.15s;
    }
    .s5-btn-group .s5-btn:hover {
        background: #e9ecef;
    }
    .s5-btn-group .s5-btn.active {
        background: #2c3e50;
        color: #fff;
        border-color: #2c3e50;
    }
    .s5-validation-error {
        color: #e74c3c;
        font-size: 0.9rem;
        margin-top: 0.3rem;
        display: none;
    }
    #s5-global-error {
        color: #e74c3c;
        font-weight: bold;
        font-size: 1rem;
        margin-bottom: 1rem;
        display: none;
    }
</style>

<div id="survey5FormContainer" class="container my-5 text-left">
    <form id="survey5Form" name="survey5Form" onsubmit="return false">

        <h3 class="mb-4">Societal Change Perceptions</h3>
        <p class="text-muted mb-4">Please indicate the extent to which you agree or disagree with each statement.</p>

        <div id="s5-global-error">Please answer all questions before continuing.</div>

        <div id="s5-questions-container"></div>

        <div id="survey5FormButtonContainer" class="container text-center my-5">
            <button id="continueButton" class="btn btn-lg btn-primary">Next</button>
        </div>
    </form>
</div>

<script>
(function() {
    var questions = [
        "The skills and abilities needed for success in our society are changing rapidly.",
        "It is very difficult to predict what skills will be needed for success in the next 2 to 3 years.",
        "Workplaces today increasingly value creativity and original thinking over following established procedures.",
        "In today\u2019s job market, proven ability and results matter more than seniority or loyalty.",
        "Our society increasingly rewards people who express their individuality rather than those who conform.",
        "Overall, the way people work and succeed in society has not changed much from previous generations.",
        "Compared to today, in 2050, jobs will increasingly require integrating knowledge from multiple domains.",
        "Managing complex tasks will be more important for success in 2050 than it is today.",
        "Finding unique ideas or solutions to problems will be more important for success in 2050 than it is today.",
        "Using a number of complex or high-level skills will be more important for success in 2050 than it is today.",
        "Compared to today, in 2050, jobs will require a greater depth of knowledge and expertise."
    ];

    var options = ["Strongly Disagree", "Disagree", "Neither Agree nor Disagree", "Agree", "Strongly Agree"];
    var container = document.getElementById("s5-questions-container");

    questions.forEach(function(text, i) {
        var qNum = i + 1;
        var div = document.createElement("div");
        div.className = "s5-question";

        var label = document.createElement("label");
        label.textContent = qNum + ". " + text;
        div.appendChild(label);

        var input = document.createElement("input");
        input.type = "hidden";
        input.name = "Q" + qNum;
        input.id = "Q" + qNum;
        input.className = "response s5-hidden-input";
        div.appendChild(input);

        var btnGroup = document.createElement("div");
        btnGroup.className = "s5-btn-group";

        options.forEach(function(opt) {
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "s5-btn";
            btn.textContent = opt;
            btn.setAttribute("data-question", "Q" + qNum);
            btn.setAttribute("data-value", opt);

            btn.addEventListener("click", function() {
                var hiddenInput = document.getElementById(this.getAttribute("data-question"));
                var siblings = this.parentNode.querySelectorAll(".s5-btn");

                if (this.classList.contains("active")) {
                    this.classList.remove("active");
                    hiddenInput.value = "";
                } else {
                    siblings.forEach(function(s) { s.classList.remove("active"); });
                    this.classList.add("active");
                    hiddenInput.value = this.getAttribute("data-value");
                }

                var errorEl = this.parentNode.parentNode.querySelector(".s5-validation-error");
                if (errorEl && hiddenInput.value) {
                    errorEl.style.display = "none";
                }
            });

            btnGroup.appendChild(btn);
        });

        div.appendChild(btnGroup);

        var errorMsg = document.createElement("div");
        errorMsg.className = "s5-validation-error";
        errorMsg.textContent = "Please select an option.";
        div.appendChild(errorMsg);

        container.appendChild(div);
    });

    window.validateSurvey5Form = function() {
        var allAnswered = true;
        var inputs = container.querySelectorAll(".s5-hidden-input");
        var globalError = document.getElementById("s5-global-error");

        inputs.forEach(function(input) {
            var questionDiv = input.closest(".s5-question");
            var errorEl = questionDiv.querySelector(".s5-validation-error");
            if (!input.value) {
                allAnswered = false;
                errorEl.style.display = "block";
            } else {
                errorEl.style.display = "none";
            }
        });

        if (!allAnswered) {
            globalError.style.display = "block";
            var firstUnanswered = container.querySelector(".s5-validation-error[style*='block']");
            if (firstUnanswered) {
                firstUnanswered.closest(".s5-question").scrollIntoView({ behavior: "smooth", block: "center" });
            }
        } else {
            globalError.style.display = "none";
        }

        return allAnswered;
    };
})();
</script>
